version: '3.8'

# =================================================================================
# ARQUITECTURA DEL PROYECTO: DEV-PLATERO-PROJECT
# =================================================================================
# 1. FRONTEND (Puerto 5174): React + Vite. 
# 2. BACKEND (Puerto 8001): PHP 8.4 + Laravel (Apache). 
# 3. BASE DE DATOS (Puerto 3307): MySQL 8.0. 
# 4. ADMIN DB (Puerto 8081): phpMyAdmin. 
# =================================================================================
services:
  # Base de Datos (MySQL)
  db:
    image: mysql:8.0
    container_name: platero_db
    restart: always
    environment:
      MYSQL_DATABASE: platero_db
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_PASSWORD: secret
      MYSQL_USER: platero_user
    ports:
      - "3307:3306"
    volumes:
      - platero_db_data:/var/lib/mysql

  # Administrador de Base de Datos (phpMyAdmin)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: platero_phpmyadmin
    ports:
      - "8081:80"
    environment:
      - PMA_HOST=db
      - PMA_PORT=3306
    depends_on:
      - db

  # Backend (PHP/Laravel)
  backend:
    build: .
    container_name: platero_backend
    ports:
      - "8001:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/apache/000-default.conf:/etc/apache2/sites-available/000-default.conf
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=platero_db
      - DB_USERNAME=platero_user
      - DB_PASSWORD=secret
    depends_on:
      - db

  # Frontend (React con Vite)
  frontend:
    image: node:20-alpine
    container_name: platero_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5174:5173"
    command: >
      sh -c "
        if [ ! -f package.json ]; then
          npx --yes create-vite@latest . --template react &&
          printf \"import { defineConfig } from 'vite'\nimport react from '@vitejs/plugin-react'\n\nexport default defineConfig({\n  plugins: [react()],\n  server: {\n    host: true,\n    port: 5173,\n    watch: {\n      usePolling: true,\n    }\n  }\n})\" > vite.config.js
        fi &&
        npm install &&
        npm run dev -- --host 0.0.0.0
      "

volumes:
  platero_db_data: